<!doctype html><html lang="fi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kontakti · mobiiliasennus</title><style>body{margin:0;min-height:100vh;background:#071226;color:#eef4ff;font:15px system-ui;display:grid;place-items:center}.wrap{max-width:860px;padding:20px}.card{border:1px solid rgba(145,180,255,.18);background:#0d1b2f;border-radius:22px;padding:16px;margin:12px 0}.btn{border:1px solid rgba(78,158,255,.35);background:rgba(78,158,255,.18);color:#eef4ff;border-radius:14px;padding:11px 13px;font-weight:800;cursor:pointer}.ok{color:#b9f6d4}.err{color:#ffc0c0}.muted{color:#9db0d3}input{display:none}</style></head><body><div class="wrap"><h1>Kontakti · mobiilimuutosten asennus</h1><p class="muted">Valitse desktop-varmuuskopio ja mobiilimuutokset. Työkalu kirjoittaa yhdistetyn datan suoraan tämän selaimen Kontakti Desktop -muistiin.</p><div class="card"><h2>1. Desktop-varmuuskopio</h2><label class="btn" for="desk">Valitse desktop JSON</label><input id="desk" type="file" accept=".json,application/json,text/plain"><p id="ds" class="muted">Ei valittu.</p></div><div class="card"><h2>2. Mobiilimuutokset</h2><label class="btn" for="mob">Valitse mobiili JSON</label><input id="mob" type="file" accept=".json,application/json,text/plain"><p id="ms" class="muted">Ei valittu.</p></div><div class="card"><h2>3. Asenna desktopiin</h2><button class="btn" id="go">Yhdistä ja asenna desktopiin</button><p id="out" class="muted">Odottaa tiedostoja.</p></div></div><script>let D=null,M=null;const $=id=>document.getElementById(id);function pick(o,ks,d=''){for(const k of ks){if(o&&o[k]!=null&&o[k]!=='')return o[k]}return d}function day(v){if(!v)return'';let s=String(v);return/^\d{4}-\d{2}-\d{2}/.test(s)?s.slice(0,10):s}function norm(s){return String(s||'').trim().toLowerCase()}function data(o){return o&&o.data&&Array.isArray(o.data.customers)?o.data:o}function cust(o){let d=data(o);return Array.isArray(d.customers)?d.customers:null}function changes(o){return o?.changes||o?.customers||o?.data?.customers||null}function id(){return'm_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)}function nk(n){return[day(pick(n,['createdAt','date'],'')),pick(n,['action','type'],''),pick(n,['noteText','text','note'],'')].join('|')}function note(n,cid,nd){return{id:pick(n,['id'],id()),createdAt:day(pick(n,['date','createdAt','created_at'],new Date().toISOString())),noteText:String(pick(n,['text','note','body','content'],'')),purchasesText:'',action:String(pick(n,['type','action','kind'],'Merkintä')),nextDate:nd||'',sales:0,customerId:cid}}function conv(m){let cid=String(pick(m,['id','customer_id','customerId'],id())),nd=day(pick(m,['next_date','nextDate'],'')),na=String(pick(m,['next_action','nextAction','action'],''));return{id:cid,customerId:String(pick(m,['customer_id','customerId','id'],cid)),name:String(pick(m,['name','customerName','company'],'Nimetön asiakas')),city:String(pick(m,['city','town'],'')),region:String(pick(m,['region'],'')),country:String(pick(m,['country'],'FI')),businessId:String(pick(m,['business_id','businessId','ytunnus'],'')),phone:String(pick(m,['phone','tel'],'')),email:String(pick(m,['email','mail'],'')),address:String(pick(m,['address','street'],'')),contactPerson:String(pick(m,['contact_person','contactPerson'],'')),priority:!!pick(m,['priority'],false),meeting:!!pick(m,['meeting'],false)||na.toLowerCase().includes('tapa'),done:!!pick(m,['done'],false),incomplete:!!pick(m,['incomplete'],false),mobileVisible:true,nextDate:nd,nextAction:na,notes:(Array.isArray(m.notes)?m.notes:[]).map(n=>note(n,cid,nd)),createdSource:'mobile',updatedAt:new Date().toISOString()}}function find(list,m){return list.find(c=>c.id&&m.id&&String(c.id)===String(m.id))||list.find(c=>(c.customerId||c.customer_id)&&m.customerId&&String(c.customerId||c.customer_id)===String(m.customerId))||list.find(c=>(c.businessId||c.business_id)&&m.businessId&&String(c.businessId||c.business_id)===String(m.businessId))||list.find(c=>norm(c.name)===norm(m.name)&&norm(m.name))}function merge(c,m){['name','city','region','country','phone','email','address','contactPerson'].forEach(k=>{if(m[k]&&!c[k])c[k]=m[k]});if(m.customerId&&!c.customerId)c.customerId=m.customerId;if(m.businessId&&!c.businessId)c.businessId=m.businessId;if(m.nextDate)c.nextDate=m.nextDate;if(m.nextAction)c.nextAction=m.nextAction;c.priority=!!m.priority;c.meeting=!!m.meeting;c.done=!!m.done;c.incomplete=!!m.incomplete;c.notes=Array.isArray(c.notes)?c.notes:[];let s=new Set(c.notes.map(nk)),n=0;m.notes.forEach(x=>{if(!s.has(nk(x))){c.notes.unshift(x);n++}});c.updatedAt=new Date().toISOString();return n}async function read(f){return JSON.parse(await f.text())}$('desk').onchange=async e=>{try{D=await read(e.target.files[0]);let l=cust(D);if(!l)throw Error('customers puuttuu');$('ds').className='ok';$('ds').textContent='OK: '+l.length+' asiakasta'}catch(x){D=null;$('ds').className='err';$('ds').textContent=x.message}};$('mob').onchange=async e=>{try{M=await read(e.target.files[0]);let l=changes(M);if(!Array.isArray(l))throw Error('changes puuttuu');$('ms').className='ok';$('ms').textContent='OK: '+l.length+' muutosta'}catch(x){M=null;$('ms').className='err';$('ms').textContent=x.message}};function saveDB(value){return new Promise((res,rej)=>{let r=indexedDB.open('kontakti_db',1);r.onupgradeneeded=()=>r.result.createObjectStore('kv');r.onerror=()=>rej(r.error);r.onsuccess=()=>{let db=r.result,tx=db.transaction('kv','readwrite');tx.objectStore('kv').put(value,'own');tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)}})}$('go').onclick=async()=>{try{if(!D||!M)throw Error('Valitse molemmat tiedostot');let list=cust(D),ch=changes(M);let up=0,add=0,notes=0;ch.map(conv).forEach(m=>{let c=find(list,m);if(c){up++;notes+=merge(c,m)}else{list.unshift(m);add++;notes+=m.notes.length}});let d=data(D);d.customers=list;await saveDB(d);localStorage.setItem('kontakti_v1_own',JSON.stringify(d));$('out').className='ok';$('out').textContent='Asennettu desktopiin. Päivitetty '+up+', uusia '+add+', merkintöjä '+notes+'. Avaa nyt Kontakti Desktop.'}catch(x){$('out').className='err';$('out').textContent='Virhe: '+x.message}};</script></body></html>
