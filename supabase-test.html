<!doctype html><html lang="fi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kontakti · Supabase testi</title><style>body{margin:0;background:#071226;color:#eef4ff;font:15px system-ui,-apple-system,Segoe UI,Roboto,sans-serif}.wrap{max-width:900px;margin:auto;padding:20px}.card{border:1px solid rgba(145,180,255,.18);background:#0d1b2f;border-radius:22px;padding:16px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn,input,textarea{font:inherit}.btn{border:1px solid rgba(78,158,255,.35);background:rgba(78,158,255,.18);color:#eef4ff;border-radius:14px;padding:11px 13px;font-weight:800;cursor:pointer}.btn.full{width:100%}input,textarea{width:100%;box-sizing:border-box;border:1px solid rgba(190,215,255,.28);background:#071226;color:#fff;border-radius:13px;padding:11px;margin:6px 0 10px}.muted{color:#9db0d3}.ok{color:#b9f6d4}.err{color:#ffc0c0}.small{font-size:12px}.list{display:grid;gap:8px}.item{border:1px solid rgba(145,180,255,.14);background:rgba(255,255,255,.035);border-radius:16px;padding:10px}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><h1>Kontakti · Supabase testi</h1><p class="muted">Tämä on varmistussivu ennen kuin kytketään Supabase suoraan mobiiliin ja desktopiin.</p><div class="card"><h2>1. Kirjaudu / luo käyttäjä</h2><div class="grid"><div><label>Sähköposti</label><input id="email" placeholder="sähköposti"></div><div><label>Salasana</label><input id="password" type="password" placeholder="vähintään 6 merkkiä"></div></div><button class="btn" id="signup">Luo käyttäjä</button> <button class="btn" id="signin">Kirjaudu</button> <button class="btn" id="signout">Kirjaudu ulos</button><p id="authStatus" class="muted">Ei kirjautunut.</p></div><div class="card"><h2>2. Workspace</h2><p class="muted">Luo tai hae oma Kontakti-testityötila.</p><button class="btn full" id="workspaceBtn">Luo / hae workspace</button><p id="workspaceStatus" class="muted">Ei workspacea.</p></div><div class="card"><h2>3. Testimerkintä pilveen</h2><div class="grid"><div><label>Asiakas</label><input id="custName" value="Supabase testiasiakas"></div><div><label>Merkintä</label><input id="noteText" value="Testimerkintä Supabasesta"></div></div><button class="btn full" id="saveBtn">Tallenna asiakas + merkintä Supabaseen</button><p id="saveStatus" class="muted">Ei tallennettu.</p></div><div class="card"><h2>4. Pilvestä haettu data</h2><button class="btn full" id="loadBtn">Hae viimeisimmät asiakkaat</button><div id="dataList" class="list" style="margin-top:12px"></div></div></div><script type="module">import{createClient}from'https://esm.sh/@supabase/supabase-js@2';const SUPABASE_URL='https://miahuckcphquawobehtk.supabase.co';const SUPABASE_KEY='sb_publishable_tY1y97VnFfhXyKJ_9XCNGw_-rEq2pLx';const sb=createClient(SUPABASE_URL,SUPABASE_KEY);let user=null,workspace=null;const $=id=>document.getElementById(id);function msg(id,text,cls='muted'){$(id).className=cls;$(id).textContent=text}function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}async function refreshAuth(){const{data}=await sb.auth.getUser();user=data?.user||null;msg('authStatus',user?'Kirjautunut: '+user.email:'Ei kirjautunut.',user?'ok':'muted')}$('signup').onclick=async()=>{const email=$('email').value.trim(),password=$('password').value;const{error}=await sb.auth.signUp({email,password});if(error)return msg('authStatus','Virhe: '+error.message,'err');msg('authStatus','Käyttäjä luotu. Jos Supabase pyytää vahvistusta, käy sähköpostissa. Muuten voit kirjautua.','ok');await refreshAuth()};$('signin').onclick=async()=>{const email=$('email').value.trim(),password=$('password').value;const{error}=await sb.auth.signInWithPassword({email,password});if(error)return msg('authStatus','Virhe: '+error.message,'err');await refreshAuth()};$('signout').onclick=async()=>{await sb.auth.signOut();user=null;workspace=null;await refreshAuth();msg('workspaceStatus','Ei workspacea.','muted')};$('workspaceBtn').onclick=async()=>{await refreshAuth();if(!user)return msg('workspaceStatus','Kirjaudu ensin.','err');let{data,error}=await sb.from('kontakti_workspaces').select('*').limit(1);if(error)return msg('workspaceStatus','Virhe haussa: '+error.message,'err');if(!data||!data.length){let res=await sb.from('kontakti_workspaces').insert({name:'Kontakti testiversio',owner_id:user.id}).select().single();if(res.error)return msg('workspaceStatus','Virhe luonnissa: '+res.error.message,'err');workspace=res.data}else workspace=data[0];msg('workspaceStatus','Workspace OK: '+workspace.id,'ok')};async function ensureWorkspace(){if(workspace)return workspace;await $('workspaceBtn').onclick();if(!workspace)throw new Error('Workspace puuttuu');return workspace}$('saveBtn').onclick=async()=>{try{await refreshAuth();if(!user)throw new Error('Kirjaudu ensin');const w=await ensureWorkspace();const customer={workspace_id:w.id,name:$('custName').value.trim()||'Nimetön',next_action:'Soitto',mobile_visible:true,created_source:'supabase-test'};let c=await sb.from('kontakti_customers').insert(customer).select().single();if(c.error)throw c.error;let n=await sb.from('kontakti_notes').insert({workspace_id:w.id,customer_id:c.data.id,note_type:'Testi',note_text:$('noteText').value,note_date:new Date().toISOString().slice(0,10),created_source:'supabase-test'}).select().single();if(n.error)throw n.error;msg('saveStatus','Tallennettu pilveen: '+c.data.name,'ok');await load()}catch(e){msg('saveStatus','Virhe: '+e.message,'err')}};async function load(){try{const w=await ensureWorkspace();const{data,error}=await sb.from('kontakti_customers').select('id,name,next_date,next_action,priority,created_at').eq('workspace_id',w.id).order('created_at',{ascending:false}).limit(10);if(error)throw error;$('dataList').innerHTML=(data||[]).map(c=>`<div class="item"><b>${esc(c.name)}</b><div class="small muted">${esc(c.next_action||'')} · ${esc(c.created_at||'')}</div></div>`).join('')||'<div class="muted">Ei dataa.</div>'}catch(e){$('dataList').innerHTML='<div class="err">Virhe: '+esc(e.message)+'</div>'}}$('loadBtn').onclick=load;await refreshAuth();</script></body></html>
