<!doctype html><html lang="fi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kontakti Cloud UI</title><style>:root{--bg0:#071226;--bg1:#091a35;--panel:rgba(255,255,255,.05);--stroke:rgba(255,255,255,.12);--text:rgba(255,255,255,.92);--muted:rgba(255,255,255,.62);--brand:#2d6bff;--ok:#26d07c;--warn:#ffcc66;--amber:#ff9f43;--danger:#ff4d4d;--prio:#8b5cf6;--shadow:0 14px 40px rgba(0,0,0,.35);--r:22px}*{box-sizing:border-box}html,body{height:100%}body{margin:0;font:15px system-ui;color:var(--text);background:radial-gradient(1200px 700px at 18% 0%,rgba(45,107,255,.22),transparent 62%),linear-gradient(180deg,var(--bg0),var(--bg1));overflow:hidden}.app{height:100%;display:grid;grid-template-columns:260px 1fr;gap:18px;padding:18px}.side,.card,.top{background:var(--panel);border:1px solid var(--stroke);backdrop-filter:blur(8px);box-shadow:var(--shadow);border-radius:var(--r)}.side{padding:16px 14px;display:flex;flex-direction:column}.brand{display:flex;gap:11px;align-items:center;margin:8px 10px 16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08)}.logo{width:42px;height:42px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#00c8ff,#0a84ff,#0046c8);font-weight:900}.title{font-size:28px;font-weight:760}.sub,.muted,.hint{font-size:12px;color:var(--muted)}.nav{display:flex;flex-direction:column;gap:10px}.nav button{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.035);color:var(--text);border-radius:999px;padding:12px 14px;text-align:left;cursor:pointer;font-size:21px;font-weight:650;display:flex;justify-content:space-between}.nav button.active{border-color:rgba(45,107,255,.55);background:rgba(45,107,255,.18);box-shadow:0 0 20px rgba(45,107,255,.26)}.pill,.tag{font-size:12px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.06);padding:2px 8px;border-radius:999px}.sales{margin:16px 6px 0;padding:12px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.035);border-radius:16px}.sales b{display:block;font-size:20px;margin-top:5px}.tools{margin-top:auto;display:flex;flex-direction:column;gap:10px}.btn{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--text);border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:600;text-decoration:none;display:inline-flex;justify-content:center}.btn.primary{background:linear-gradient(180deg,rgba(45,107,255,.95),rgba(33,83,200,.95));color:white}.main{min-width:0;min-height:0;display:flex;flex-direction:column;gap:14px}.top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px}.search{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:10px 12px;max-width:520px;flex:1}.search input{border:0;background:transparent;color:var(--text);outline:0;width:100%}.content{flex:1;min-height:0;display:grid;grid-template-columns:40% 60%;gap:14px}.card{min-height:0;overflow:hidden;display:flex;flex-direction:column}.head{padding:14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between}.body{padding:14px;overflow:auto}.list{display:flex;flex-direction:column;gap:10px}.row{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);border-radius:14px;padding:12px;cursor:pointer}.row.active{border-color:rgba(45,107,255,.62);background:rgba(45,107,255,.16)}.row-name{font-weight:680}.row-meta{font-size:12px;color:var(--muted);margin-top:5px}.dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:8px}.green{background:var(--ok)}.yellow{background:var(--warn)}.orange{background:var(--amber)}.red{background:var(--danger)}.gray{background:rgba(255,255,255,.28)}.prio{border-color:rgba(139,92,246,.48);background:rgba(139,92,246,.12)}.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.detail h2{margin:0;font-size:24px}.detail-sub{font-size:12px;color:var(--muted);margin-top:8px}.box{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);border-radius:16px;padding:12px;margin-bottom:12px}.kv{display:flex;justify-content:space-between;gap:12px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.025);border-radius:12px;padding:10px;margin-top:8px}.kv span{text-align:right;max-width:65%}input,textarea,select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:var(--text);border-radius:14px;padding:10px 12px;margin-top:8px}textarea{min-height:110px}select option{background:#0d1a33}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:980px){body{overflow:auto}.app{grid-template-columns:1fr}.content{grid-template-columns:1fr}}@media(max-width:680px){.grid{grid-template-columns:1fr}.app{padding:12px}}</style></head><body><div class="app"><aside class="side"><div class="brand"><div class="logo">K</div><div><div class="title">Kontakti</div><div class="sub">by Opero</div></div></div><nav class="nav"><button class="active" data-view="today">Soita tänään <span class="pill" id="pToday">0</span></button><button data-view="customers">Asiakkaat <span class="pill" id="pCust">0</span></button><button data-view="weekly">Viikkoraportti <span class="pill">vko</span></button><button data-view="settings">Asetukset</button></nav><div class="sales"><span class="muted">Myynti</span><b id="sales">€0</b><div class="muted" id="salesSub">Pilvisynkka käytössä</div></div><div class="tools"><a class="btn" href="import.html?v=1">Import</a><a class="btn" href="report.html?v=1">Raportti</a><a class="btn" href="supabase.html?v=5">Vanha pilvitesti</a><div class="hint" id="auth">Tarkistetaan...</div></div></aside><main class="main"><header class="top"><div style="display:flex;gap:12px;align-items:center;flex:1"><b id="page">Soita tänään</b><div class="search" id="searchBox" style="display:none"><span>⌕</span><input id="q" placeholder="Hae asiakasta..."></div></div><button class="btn" id="refresh">Päivitä</button></header><section class="content"><div class="card"><div class="head"><div><b id="listTitle">Lista</b><div class="muted" id="listSub">Erääntyneet + tänään</div></div><div class="hint" id="status">Valmis.</div></div><div class="body"><div id="list" class="list"></div></div></div><div class="card detail"><div class="head"><div><h2 id="dName">Valitse asiakas</h2><div class="detail-sub" id="dSub">Klikkaa listasta asiakasta.</div></div></div><div class="body" id="detail"><div class="box hint">Valitse asiakas vasemmalta.</div></div></div></section></main></div><script type="module">import{createClient}from'https://esm.sh/@supabase/supabase-js@2';const sb=createClient('https://miahuckcphquawobehtk.supabase.co','sb_publishable_tY1y97VnFfhXyKJ_9XCNGw_-rEq2pLx');let user=null,ws=null,cs=[],ns=[],sel=null,view='today';const $=id=>document.getElementById(id);const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const today=()=>new Date().toISOString().slice(0,10);const fi=s=>s?new Date(s+'T00:00:00').toLocaleDateString('fi-FI'):'–';const age=s=>s?Math.floor((Date.now()-new Date(s+'T00:00:00'))/86400000):null;function col(s){let d=age(s);return d==null?'gray':d<=30?'green':d<=60?'yellow':d<=90?'orange':'red'}function st(t,c='hint'){$('status').className=c;$('status').textContent=t}async function auth(){let r=await sb.auth.getUser();user=r.data?.user||null;$('auth').textContent=user?'Kirjautunut: '+user.email:'Kirjaudu ensin vanhalla pilvitestisivulla';return user}async function workspace(){if(ws)return ws;if(!await auth())throw Error('Kirjautuminen puuttuu');let r=await sb.from('kontakti_workspaces').select('*').limit(1);if(r.error)throw r.error;ws=r.data[0];return ws}async function load(){try{st('Haetaan pilvestä...');let w=await workspace();let a=await sb.from('kontakti_customers').select('*').eq('workspace_id',w.id).is('deleted_at',null).order('priority',{ascending:false}).order('next_date',{ascending:true,nullsFirst:false});if(a.error)throw a.error;cs=a.data||[];let b=await sb.from('kontakti_notes').select('*').eq('workspace_id',w.id).is('deleted_at',null).order('note_date',{ascending:false}).limit(1000);if(b.error)throw b.error;ns=b.data||[];if(!sel&&cs[0])sel=cs[0].id;render();st('Haettu '+cs.length+' asiakasta','ok')}catch(e){st('Virhe: '+e.message,'err')}}function due(c){return !c.next_date?'Ei päivää':c.next_date<today()?'Erääntynyt':c.next_date===today()?'Tänään':'Tulossa'}function visible(){let a=[...cs];if(view==='today')a=a.filter(c=>c.next_date&&c.next_date<=today());if(view==='customers'){let q=$('q').value.toLowerCase();a=a.filter(c=>[c.name,c.city,c.region,c.phone,c.email,c.address,c.business_id].join(' ').toLowerCase().includes(q))}return a.sort((x,y)=>(y.priority-x.priority)||(x.next_date||'').localeCompare(y.next_date||'')||(x.name||'').localeCompare(y.name||''))}function render(){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));$('page').textContent=view==='today'?'Soita tänään':view==='customers'?'Asiakkaat':view==='weekly'?'Viikkoraportti':'Asetukset';$('searchBox').style.display=view==='customers'?'flex':'none';$('pCust').textContent=cs.length;$('pToday').textContent=cs.filter(c=>c.next_date&&c.next_date<=today()).length;let total=cs.reduce((s,c)=>s+Number(c.sales_ytd||0),0);$('sales').textContent='€'+total.toLocaleString('fi-FI');$('salesSub').textContent=cs.filter(c=>Number(c.sales_ytd||0)>0).length+' ostanutta';if(view==='weekly')return weekly();if(view==='settings')return settings();let arr=visible();$('listSub').textContent=view==='today'?'Erääntyneet + tänään':'Kaikki asiakkaat';$('list').innerHTML=arr.map(c=>'<div class="row '+(sel===c.id?'active':'')+'" data-id="'+c.id+'"><div><span class="dot '+col(c.last_contact)+'"></span><span class="row-name">'+esc(c.name)+'</span> '+(c.priority?'<span class="tag prio">Priority</span>':'')+'</div><div class="row-meta">'+esc(c.city||c.region||'–')+(c.phone?'<br>Puhelin: '+esc(c.phone):'')+'</div><div class="tags"><span class="tag">Seuraava: '+fi(c.next_date)+' ('+due(c)+')</span><span class="tag">Viime: '+fi(c.last_contact)+'</span><span class="tag">'+esc(c.next_action||'Soitto')+'</span></div></div>').join('')||'<div class="hint">Ei asiakkaita.</div>';document.querySelectorAll('.row').forEach(r=>r.onclick=()=>{sel=r.dataset.id;show();render()});show()}function show(){let c=cs.find(x=>x.id===sel);if(!c){$('dName').textContent='Valitse asiakas';$('dSub').textContent='Klikkaa listasta asiakasta.';$('detail').innerHTML='<div class="box hint">Valitse asiakas vasemmalta.</div>';return}$('dName').textContent=c.name;$('dSub').innerHTML='Viime kontakti: <b>'+fi(c.last_contact)+'</b> · Seuraava: <b>'+fi(c.next_date)+'</b>';let hist=ns.filter(n=>n.customer_id===c.id);$('detail').innerHTML='<div class="box"><b>Nykytila</b><div class="kv"><b>Seuraava</b><span>'+fi(c.next_date)+'</span></div><div class="kv"><b>Toimenpide</b><span>'+esc(c.next_action||'Soitto')+'</span></div><div class="kv"><b>Myynti YTD</b><span>€'+Number(c.sales_ytd||0).toLocaleString('fi-FI')+'</span></div></div><div class="box"><b>Lisää merkintä</b><select id="nt"><option>Soitto</option><option>Tapaaminen</option><option>Sähköposti</option><option>Seuranta</option><option>Muistiinpano</option></select><textarea id="txt" placeholder="Kirjaa muistiinpano..."></textarea><div class="grid"><input id="nd" type="date" value="'+esc(c.next_date||'')+'"><select id="na"><option>Soitto</option><option>Tapaaminen</option><option>Sähköposti</option><option>Seuranta</option></select></div><button class="btn primary" id="save">Tallenna merkintä</button></div><div class="box"><b>Perustiedot</b><div class="kv"><b>Y-tunnus</b><span>'+esc(c.business_id||'–')+'</span></div><div class="kv"><b>Puhelin</b><span>'+esc(c.phone||'–')+'</span></div><div class="kv"><b>Email</b><span>'+esc(c.email||'–')+'</span></div><div class="kv"><b>Osoite</b><span>'+esc(c.address||'–')+'</span></div></div><div class="box"><b>Historia</b>'+hist.slice(0,12).map(n=>'<div class="kv"><b>'+fi(n.note_date)+'</b><span>'+esc((n.note_type||'Merkintä')+': '+(n.note_text||''))+'</span></div>').join('')+'</div>';$('na').value=c.next_action||'Soitto';$('save').onclick=()=>save(c)}async function save(c){try{let text=$('txt').value.trim();if(!text)throw Error('Kirjaa muistiinpano ensin');let w=await workspace();let nd=$('nd').value||null,na=$('na').value||'Soitto';let r=await sb.from('kontakti_notes').insert({workspace_id:w.id,customer_id:c.id,note_date:today(),note_type:$('nt').value,note_text:text,next_date:nd,created_source:'cloud-ui'});if(r.error)throw r.error;let u=await sb.from('kontakti_customers').update({last_contact:today(),next_date:nd,next_action:na}).eq('id',c.id);if(u.error)throw u.error;await load();st('Merkintä tallennettu','ok')}catch(e){st('Virhe: '+e.message,'err')}}function weekly(){let rows=ns.filter(n=>n.note_date>=today().slice(0,8)+'01');let names=Object.fromEntries(cs.map(c=>[c.id,c.name]));$('listSub').textContent='Kuukauden merkinnät';$('list').innerHTML='<div class="hint">Merkintöjä: '+rows.length+'</div>';$('dName').textContent='Viikkoraportti';$('dSub').textContent='Kopioitava raportti';$('detail').innerHTML='<div class="box"><textarea id="rep" style="min-height:360px">RAPORTTI\n\nMerkintöjä: '+rows.length+'\n\n'+rows.map(n=>'- '+fi(n.note_date)+' | '+(names[n.customer_id]||'Asiakas')+' | '+(n.note_type||'Merkintä')+'\n  '+(n.note_text||'')).join('\n\n')+'</textarea><button class="btn primary" id="copy">Kopioi</button></div>';$('copy').onclick=async()=>{await navigator.clipboard.writeText($('rep').value);st('Raportti kopioitu','ok')}}function settings(){$('listSub').textContent='Työkalut';$('list').innerHTML='<a class="btn" href="import.html?v=1">Import</a><a class="btn" href="report.html?v=1">Raportti</a><a class="btn" href="supabase.html?v=5">Vanha pilvitesti</a>';$('dName').textContent='Asetukset';$('dSub').textContent='Pilvisynkka';$('detail').innerHTML='<div class="box hint">Tämä on ensimmäinen alkuperäisen UI:n mukainen pilviversio. Toimiva v5 säilyy varalla.</div>'}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{view=b.dataset.view;render()});$('q').oninput=render;$('refresh').onclick=load;await auth();await load();</script></body></html>
