<!doctype html><html lang="fi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kontakti Desktop · Supabase</title><style>:root{--bg:#071226;--panel:#0d1b2f;--card:#10233d;--line:rgba(145,180,255,.18);--text:#eef4ff;--muted:#9db0d3;--blue:#4e9eff;--green:#35d48d;--purple:#9f6bff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px system-ui,-apple-system,Segoe UI,Roboto,sans-serif}.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}.side{background:#071226;border-right:1px solid var(--line);padding:18px}.main{padding:18px}.title{font-size:26px;font-weight:900}.card{border:1px solid var(--line);background:var(--panel);border-radius:20px;padding:14px;margin:10px 0}.btn,input,textarea,select{font:inherit}.btn{border:1px solid rgba(78,158,255,.35);background:rgba(78,158,255,.16);color:var(--text);border-radius:13px;padding:10px 12px;font-weight:800;cursor:pointer}.btn.full{width:100%}input,textarea,select{width:100%;border:1px solid rgba(190,215,255,.28);background:#06101f;color:#fff;border-radius:13px;padding:10px;margin:6px 0 10px}textarea{min-height:90px}.muted{color:var(--muted)}.ok{color:#b9f6d4}.err{color:#ffc0c0}.list{display:grid;gap:8px}.item{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.035);cursor:pointer}.item:hover{background:rgba(78,158,255,.08)}.name{font-weight:900}.badge{display:inline-block;font-size:11px;border-radius:999px;padding:4px 7px;margin-left:5px}.prio{background:rgba(159,107,255,.18);color:#ddcaff}.meet{background:rgba(53,212,141,.14);color:#b9f6d4}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.small{font-size:12px}.note{white-space:pre-wrap;border-top:1px solid rgba(255,255,255,.08);padding-top:9px;margin-top:9px}@media(max-width:800px){.app{grid-template-columns:1fr}.side{border-right:0;border-bottom:1px solid var(--line)}} </style></head><body><div class="app"><aside class="side"><div class="muted small">Opero · Kontakti</div><div class="title">Desktop Supabase</div><div class="card"><b>Kirjautuminen</b><input id="email" placeholder="sähköposti"><input id="password" type="password" placeholder="salasana"><button class="btn" id="signin">Kirjaudu</button> <button class="btn" id="signout">Ulos</button><p id="auth" class="muted">Tarkistetaan...</p></div><div class="card"><b>Toiminnot</b><button class="btn full" id="refresh">Päivitä pilvestä</button><p id="status" class="muted">Valmis.</p></div><div class="card"><b>Haku</b><input id="search" placeholder="Hae asiakasta"></div><div id="customers" class="list"></div></aside><main class="main"><div id="detail" class="card"><h2>Valitse asiakas</h2><p class="muted">Asiakkaat ja merkinnät haetaan Supabasesta.</p></div></main></div><script type="module">import{createClient}from'https://esm.sh/@supabase/supabase-js@2';const sb=createClient('https://miahuckcphquawobehtk.supabase.co','sb_publishable_tY1y97VnFfhXyKJ_9XCNGw_-rEq2pLx');let user=null,workspace=null,customers=[],notes=[],selected=null;const $=id=>document.getElementById(id);function msg(id,t,c='muted'){$(id).className=c;$(id).textContent=t}function e(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}async function auth(){const{data}=await sb.auth.getUser();user=data?.user||null;msg('auth',user?'Kirjautunut: '+user.email:'Ei kirjautunut',user?'ok':'muted');return user}async function ws(){if(workspace)return workspace;if(!await auth())throw Error('Kirjaudu ensin');let r=await sb.from('kontakti_workspaces').select('*').limit(1);if(r.error)throw r.error;if(r.data?.length)workspace=r.data[0];else{let n=await sb.from('kontakti_workspaces').insert({name:'Kontakti',owner_id:user.id}).select().single();if(n.error)throw n.error;workspace=n.data}return workspace}async function load(){try{msg('status','Haetaan pilvestä...');let w=await ws();let r=await sb.from('kontakti_customers').select('*').eq('workspace_id',w.id).is('deleted_at',null).order('priority',{ascending:false}).order('next_date',{ascending:true,nullsFirst:false}).limit(1000);if(r.error)throw r.error;customers=r.data||[];let nr=await sb.from('kontakti_notes').select('*').eq('workspace_id',w.id).is('deleted_at',null).order('note_date',{ascending:false}).order('created_at',{ascending:false}).limit(3000);if(nr.error)throw nr.error;notes=nr.data||[];render();if(selected)show(selected.id);msg('status','Haettu '+customers.length+' asiakasta ja '+notes.length+' merkintää','ok')}catch(x){msg('status','Virhe: '+x.message,'err')}}function render(){const q=$('search').value.toLowerCase();let list=customers.filter(c=>[c.name,c.city,c.phone,c.address,c.business_id].join(' ').toLowerCase().includes(q));$('customers').innerHTML=list.map(c=>`<div class="item" onclick="show('${c.id}')"><div class="name">${e(c.name)} ${c.priority?'<span class="badge prio">Priority</span>':''}${c.meeting?'<span class="badge meet">Tapaaminen</span>':''}</div><div class="small muted">${e(c.city||'')} · ${e(c.next_date||'ei päivää')} · ${e(c.next_action||'')}</div></div>`).join('')||'<div class="muted">Ei asiakkaita.</div>'}window.show=id=>{selected=customers.find(c=>c.id===id);if(!selected)return;const ns=notes.filter(n=>n.customer_id===id);$('detail').innerHTML=`<h1>${e(selected.name)}</h1><p class="muted">${e(selected.city||'')} ${selected.business_id?' · '+e(selected.business_id):''}</p><div class="grid"><div><b>Puhelin</b><p>${e(selected.phone||'—')}</p></div><div><b>Osoite</b><p>${e(selected.address||'—')}</p></div><div><b>Seuraava</b><p>${e(selected.next_date||'ei päivää')} · ${e(selected.next_action||'')}</p></div><div><b>Tila</b><p>${selected.priority?'Priority ':''}${selected.meeting?'Tapaaminen ':''}${selected.done?'Hoidettu':''}</p></div></div><h2>Merkinnät</h2>${ns.map(n=>`<div class="item"><b>${e(n.note_date)} · ${e(n.note_type)}</b><div class="note">${e(n.note_text||'')}</div></div>`).join('')||'<p class="muted">Ei merkintöjä.</p>'}`};$('signin').onclick=async()=>{let r=await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});if(r.error)return msg('auth','Virhe: '+r.error.message,'err');workspace=null;await auth();await load()};$('signout').onclick=async()=>{await sb.auth.signOut();user=null;workspace=null;customers=[];notes=[];selected=null;render();$('detail').innerHTML='<h2>Valitse asiakas</h2>';await auth()};$('refresh').onclick=load;$('search').oninput=render;await auth();if(user)await load();</script></body></html>
