<!doctype html><html lang="fi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kontakti · Pilvisynkka</title><style>:root{--bg:#06101f;--panel:#0d1b2f;--panel2:#10233d;--line:rgba(145,180,255,.18);--text:#eef4ff;--muted:#9db0d3;--blue:#4e9eff;--green:#35d48d;--purple:#9f6bff;--red:#ff5f7a;--amber:#f6c453}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,rgba(78,158,255,.14),transparent 34%),var(--bg);color:var(--text);font:15px system-ui,-apple-system,Segoe UI,Roboto,sans-serif}.app{display:grid;grid-template-columns:335px 1fr;min-height:100vh}.side{border-right:1px solid var(--line);background:rgba(7,18,38,.92);padding:18px;position:sticky;top:0;height:100vh;overflow:auto}.main{padding:20px}.brand{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}.logo{width:42px;height:42px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(78,158,255,.24),rgba(159,107,255,.22));border:1px solid rgba(255,255,255,.12);font-weight:900}.title{font-size:28px;font-weight:950;letter-spacing:-.03em}.sync{font-size:12px;color:#b9f6d4;background:rgba(53,212,141,.13);border:1px solid rgba(53,212,141,.24);border-radius:999px;padding:6px 9px;white-space:nowrap}.card{border:1px solid var(--line);background:rgba(13,27,47,.92);border-radius:22px;padding:14px;margin:10px 0;box-shadow:0 10px 32px rgba(0,0,0,.16)}.hero{padding:22px}.btn,input,textarea,select{font:inherit}.btn{border:1px solid rgba(78,158,255,.35);background:rgba(78,158,255,.16);color:var(--text);border-radius:14px;padding:10px 12px;font-weight:850;cursor:pointer;text-decoration:none;display:inline-block}.btn:hover{background:rgba(78,158,255,.25)}.btn.full{width:100%}input,textarea,select{width:100%;border:1px solid rgba(190,215,255,.28);background:#06101f;color:#fff;border-radius:14px;padding:10px;margin:6px 0 10px}textarea{min-height:90px}.muted{color:var(--muted)}.ok{color:#b9f6d4}.err{color:#ffc0c0}.list{display:grid;gap:8px}.item{border:1px solid var(--line);border-radius:18px;padding:12px;background:rgba(255,255,255,.035);cursor:pointer}.item:hover{background:rgba(78,158,255,.08)}.item.active{border-color:rgba(78,158,255,.55);background:rgba(78,158,255,.12)}.name{font-weight:950}.badge{display:inline-block;font-size:11px;border-radius:999px;padding:4px 7px;margin-left:5px;font-weight:850}.prio{background:rgba(159,107,255,.20);color:#ddcaff;border:1px solid rgba(159,107,255,.28)}.meet{background:rgba(53,212,141,.14);color:#b9f6d4;border:1px solid rgba(53,212,141,.24)}.done{background:rgba(78,158,255,.14);color:#cbe2ff;border:1px solid rgba(78,158,255,.24)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.small{font-size:12px}.field{border:1px solid rgba(145,180,255,.12);background:rgba(255,255,255,.03);border-radius:18px;padding:12px}.field b{display:block;color:#d9e7ff;margin-bottom:5px}.note{white-space:pre-wrap;border-top:1px solid rgba(255,255,255,.08);padding-top:9px;margin-top:9px}.empty{padding:18px;border:1px dashed rgba(145,180,255,.22);border-radius:18px;color:var(--muted)}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.pill{border-radius:999px;border:1px solid rgba(145,180,255,.18);padding:7px 9px;color:var(--muted);font-size:12px}.sectionTitle{display:flex;align-items:center;justify-content:space-between;gap:10px}h1,h2,h3,p{margin-top:0}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto;border-right:0;border-bottom:1px solid var(--line)}}@media(max-width:620px){.grid{grid-template-columns:1fr}.main{padding:12px}.side{padding:12px}}</style></head><body><div class="app"><aside class="side"><div class="brand"><div style="display:flex;align-items:center;gap:10px"><div class="logo">K</div><div><div class="title">Kontakti</div><div class="muted small">Kevyt asiakashallinta</div></div></div><div class="sync">Pilvisynkka käytössä</div></div><div class="card"><b>Kirjautuminen</b><input id="email" placeholder="sähköposti"><input id="password" type="password" placeholder="salasana"><div class="toolbar"><button class="btn" id="signin">Kirjaudu</button><button class="btn" id="signout">Kirjaudu ulos</button></div><p id="auth" class="muted">Tarkistetaan...</p></div><div class="card"><div class="sectionTitle"><b>Toiminnot</b><span class="pill">Supabase</span></div><button class="btn full" id="refresh">Päivitä pilvestä</button><p id="status" class="muted">Valmis.</p></div><div class="card"><b>Haku</b><input id="search" placeholder="Hae asiakasta, kaupunkia tai yhteystietoa"></div><div id="customers" class="list"></div></aside><main class="main"><div id="detail" class="card hero"><h1>Valitse asiakas</h1><p class="muted">Asiakaslista ja merkinnät haetaan pilvestä. Tee merkinnät mobiilissa, tarkista ja jatka desktopissa.</p></div></main></div><script type="module">import{createClient}from'https://esm.sh/@supabase/supabase-js@2';const sb=createClient('https://miahuckcphquawobehtk.supabase.co','sb_publishable_tY1y97VnFfhXyKJ_9XCNGw_-rEq2pLx');let user=null,workspace=null,customers=[],notes=[],selected=null;const $=id=>document.getElementById(id);function msg(id,t,c='muted'){$(id).className=c;$(id).textContent=t}function e(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function fmtDate(s){if(!s)return 'ei päivää';try{return new Date(s+'T00:00:00').toLocaleDateString('fi-FI')}catch{return s}}async function auth(){const{data}=await sb.auth.getUser();user=data?.user||null;msg('auth',user?'Kirjautunut: '+user.email:'Ei kirjautunut',user?'ok':'muted');return user}async function ws(){if(workspace)return workspace;if(!await auth())throw Error('Kirjaudu ensin');let r=await sb.from('kontakti_workspaces').select('*').limit(1);if(r.error)throw r.error;if(r.data?.length)workspace=r.data[0];else{let n=await sb.from('kontakti_workspaces').insert({name:'Kontakti',owner_id:user.id}).select().single();if(n.error)throw n.error;workspace=n.data}return workspace}async function load(){try{msg('status','Haetaan pilvestä...');let w=await ws();let r=await sb.from('kontakti_customers').select('*').eq('workspace_id',w.id).is('deleted_at',null).order('priority',{ascending:false}).order('next_date',{ascending:true,nullsFirst:false}).limit(1000);if(r.error)throw r.error;customers=r.data||[];let nr=await sb.from('kontakti_notes').select('*').eq('workspace_id',w.id).is('deleted_at',null).order('note_date',{ascending:false}).order('created_at',{ascending:false}).limit(3000);if(nr.error)throw nr.error;notes=nr.data||[];render();if(selected&&customers.some(c=>c.id===selected.id))show(selected.id);msg('status','Haettu '+customers.length+' asiakasta ja '+notes.length+' merkintää','ok')}catch(x){msg('status','Virhe: '+x.message,'err')}}function render(){const q=$('search').value.toLowerCase();let list=customers.filter(c=>[c.name,c.city,c.region,c.phone,c.email,c.address,c.business_id].join(' ').toLowerCase().includes(q));$('customers').innerHTML=list.map(c=>`<div class="item ${selected&&selected.id===c.id?'active':''}" onclick="show('${c.id}')"><div class="name">${e(c.name)} ${c.priority?'<span class="badge prio">Priority</span>':''}${c.meeting?'<span class="badge meet">Tapaaminen</span>':''}</div><div class="small muted">${e(c.city||c.region||'')} · ${fmtDate(c.next_date)} · ${e(c.next_action||'')}</div></div>`).join('')||'<div class="empty">Ei asiakkaita.</div>'}window.show=id=>{selected=customers.find(c=>c.id===id);if(!selected)return;render();const ns=notes.filter(n=>n.customer_id===id);$('detail').innerHTML=`<div class="sectionTitle"><div><h1>${e(selected.name)}</h1><p class="muted">${e(selected.city||selected.region||'')} ${selected.business_id?' · '+e(selected.business_id):''}</p></div><div>${selected.priority?'<span class="badge prio">Priority</span>':''}${selected.meeting?'<span class="badge meet">Tapaaminen</span>':''}${selected.done?'<span class="badge done">Hoidettu</span>':''}</div></div><div class="grid"><div class="field"><b>Seuraava toimenpide</b><div>${fmtDate(selected.next_date)} · ${e(selected.next_action||'—')}</div></div><div class="field"><b>Tapaaminen</b><div>${selected.meeting?'Kyllä':'Ei'}</div></div><div class="field"><b>Puhelin</b><div>${selected.phone?'<a class="btn" href="tel:'+e(selected.phone)+'">'+e(selected.phone)+'</a>':'—'}</div></div><div class="field"><b>Sähköposti</b><div>${selected.email?'<a class="btn" href="mailto:'+e(selected.email)+'">'+e(selected.email)+'</a>':'—'}</div></div><div class="field"><b>Osoite</b><div>${selected.address?e(selected.address):'—'}</div></div><div class="field"><b>Status</b><div>${selected.incomplete?'Kesken':selected.done?'Hoidettu':'Avoin'}</div></div></div><h2 style="margin-top:18px">Merkinnät</h2>${ns.map(n=>`<div class="item"><b>${fmtDate(n.note_date)} · ${e(n.note_type)}</b><div class="note">${e(n.note_text||'')}</div>${n.next_date?'<div class="small muted">Seuraava: '+fmtDate(n.next_date)+'</div>':''}</div>`).join('')||'<div class="empty">Ei merkintöjä.</div>'}`};$('signin').onclick=async()=>{let r=await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});if(r.error)return msg('auth','Virhe: '+r.error.message,'err');workspace=null;await auth();await load()};$('signout').onclick=async()=>{await sb.auth.signOut();user=null;workspace=null;customers=[];notes=[];selected=null;render();$('detail').innerHTML='<h1>Valitse asiakas</h1><p class="muted">Kirjaudu sisään ja hae asiakkaat pilvestä.</p>';await auth()};$('refresh').onclick=load;$('search').oninput=render;await auth();if(user)await load();</script></body></html>
