<!doctype html><html lang="fi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kontakti Cloud UI v2</title><style>:root{--bg0:#071226;--bg1:#091a35;--panel:rgba(255,255,255,.052);--stroke:rgba(255,255,255,.12);--text:rgba(255,255,255,.92);--muted:rgba(255,255,255,.62);--brand:#2d6bff;--ok:#26d07c;--warn:#ffcc66;--amber:#ff9f43;--danger:#ff4d4d;--prio:#8b5cf6;--shadow:0 14px 40px rgba(0,0,0,.35);--r:22px}*{box-sizing:border-box}html,body{height:100%}body{margin:0;font:15px system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--text);background:radial-gradient(1200px 700px at 18% 0%,rgba(45,107,255,.22),transparent 62%),radial-gradient(900px 500px at 90% 6%,rgba(38,208,124,.10),transparent 62%),linear-gradient(180deg,var(--bg0),var(--bg1));overflow:hidden}.app{height:100%;display:grid;grid-template-columns:260px 1fr;gap:18px;padding:18px}.glass{background:var(--panel);border:1px solid var(--stroke);backdrop-filter:blur(8px);box-shadow:var(--shadow);border-radius:var(--r)}.side{padding:16px 14px;display:flex;flex-direction:column;min-height:0}.brand{display:flex;align-items:center;justify-content:space-between;margin:8px 10px 16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08)}.brand-left{display:flex;gap:11px;align-items:center}.logo{width:42px;height:42px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#00c8ff,#0a84ff,#0046c8);box-shadow:0 0 28px rgba(42,136,255,.36);font-weight:900}.title{font-size:28px;font-weight:760;line-height:1}.sub,.muted,.hint{font-size:12px;color:var(--muted);font-weight:560}.sync-dot{font-size:18px;color:var(--ok)}.nav{display:flex;flex-direction:column;gap:10px;padding:6px}.nav button{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.035);color:var(--text);border-radius:999px;padding:12px 14px;cursor:pointer;font-size:22px;font-weight:650;display:flex;align-items:center;justify-content:space-between;transition:.14s}.nav button:hover{background:rgba(255,255,255,.055)}.nav button.active{border-color:rgba(45,107,255,.55);background:rgba(45,107,255,.18);box-shadow:0 0 0 1px rgba(45,107,255,.14),0 0 20px rgba(45,107,255,.24);transform:translateY(-1px)}.pill,.tag{font-size:12px;font-weight:650;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.06);padding:2px 8px;border-radius:999px}.tag.prio{border-color:rgba(139,92,246,.48);background:rgba(139,92,246,.13)}.sales{margin:8px 6px 0;padding:12px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.035);border-radius:16px}.sales-title{font-size:12px;color:var(--muted);font-weight:720}.sales-main{font-size:20px;font-weight:780;line-height:1.05;margin-top:5px}.tools{margin-top:auto;padding:6px;display:flex;flex-direction:column;gap:10px}.btn{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--text);border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:650;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn.primary{background:linear-gradient(180deg,rgba(45,107,255,.95),rgba(33,83,200,.95));border-color:rgba(45,107,255,.35);color:white}.btn.prio{border-color:rgba(139,92,246,.48);background:rgba(139,92,246,.10)}.footer{text-align:center;margin-top:8px}.main{min-width:0;min-height:0;display:flex;flex-direction:column;gap:14px}.top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px}.top-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}.page{font-weight:760;font-size:16px;white-space:nowrap}.search{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:10px 12px;max-width:520px;flex:1}.search input{border:0;background:transparent;color:var(--text);outline:0;width:100%}.content{flex:1;min-height:0;display:grid;grid-template-columns:40% 60%;gap:14px}.card{min-height:0;overflow:hidden;display:flex;flex-direction:column}.head{padding:14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.body{padding:14px;overflow:auto}.list{display:flex;flex-direction:column;gap:10px}.row{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);border-radius:14px;padding:12px;cursor:pointer;transition:.14s}.row:hover{background:rgba(255,255,255,.055);transform:translateY(-1px)}.row.active{border-color:rgba(45,107,255,.62);background:rgba(45,107,255,.16);box-shadow:0 0 0 1px rgba(45,107,255,.16),0 14px 30px rgba(0,0,0,.12);transform:translateY(-2px)}.row-top{display:flex;justify-content:space-between;gap:10px}.row-left{display:flex;gap:10px;min-width:0}.row-name{font-weight:700}.row-meta{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.35}.dot{width:12px;height:12px;border-radius:50%;flex:0 0 12px;margin-top:4px;border:1px solid rgba(255,255,255,.22);box-shadow:0 0 0 3px rgba(255,255,255,.03)}.green{background:var(--ok)}.yellow{background:var(--warn)}.orange{background:var(--amber)}.red{background:var(--danger)}.gray{background:rgba(255,255,255,.28)}.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.detail h2{margin:0;font-size:24px;font-weight:760}.detail-sub{font-size:12px;color:var(--muted);margin-top:8px;display:flex;gap:10px;flex-wrap:wrap}.box{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);border-radius:16px;padding:12px;margin-bottom:12px}.box-title{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px}.kv{display:flex;justify-content:space-between;gap:12px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.025);border-radius:12px;padding:10px;margin-top:8px}.kv span{text-align:right;max-width:65%;word-break:break-word}input,textarea,select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:var(--text);border-radius:14px;padding:10px 12px;margin-top:8px;outline:0}textarea{min-height:112px;resize:vertical}select option{background:#0d1a33;color:white}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.quick{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}.empty{padding:14px;color:var(--muted)}@media(max-width:980px){body{overflow:auto}.app{grid-template-columns:1fr}.content{grid-template-columns:1fr}.side{min-height:auto}}@media(max-width:680px){.app{padding:12px}.grid{grid-template-columns:1fr}.row-top{display:block}}</style></head><body><div class="app"><aside class="side glass"><div class="brand"><div class="brand-left"><div class="logo">K</div><div><div class="title">Kontakti</div><div class="sub">by Opero</div></div></div><div class="sync-dot">●</div></div><nav class="nav"><button class="active" data-view="today"><span>📞</span><span class="pill" id="pToday">0</span></button><button data-view="customers"><span>👥</span><span class="pill" id="pCust">0</span></button><button data-view="weekly"><span>📊</span><span class="pill">vko</span></button><button data-view="settings"><span>⚙</span></button></nav><div class="sales"><div class="sales-title">💶 Myynti</div><div class="sales-main" id="sales">€0</div><div class="muted" id="salesSub">Pilvisynkka käytössä</div></div><div class="tools"><a class="btn" href="import.html?v=1">📥 Import</a><a class="btn" href="report.html?v=1">📊 Raportti</a><a class="btn" href="supabase.html?v=5">🛟 Varaversio</a><div class="hint" id="auth">Tarkistetaan...</div><div class="footer hint">© 2026 ReHeko<br>All rights reserved.</div></div></aside><main class="main"><header class="top glass"><div class="top-left"><div class="page" id="page">Soita tänään</div><div class="search" id="searchBox" style="display:none"><span>⌕</span><input id="q" placeholder="Hae asiakasta..."></div></div><button class="btn" id="refresh">Päivitä</button></header><section class="content"><div class="card glass"><div class="head"><div><b id="listTitle">Lista</b><div class="muted" id="listSub">Erääntyneet + tänään</div></div><div class="hint" id="status">Valmis.</div></div><div class="body"><div id="list" class="list"></div></div></div><div class="card detail glass"><div class="head"><div><h2 id="dName">Valitse asiakas</h2><div class="detail-sub" id="dSub">Klikkaa listasta asiakasta.</div></div></div><div class="body" id="detail"><div class="box hint">Valitse asiakas vasemmalta.</div></div></div></section></main></div><script type="module">import{createClient}from'https://esm.sh/@supabase/supabase-js@2';const sb=createClient('https://miahuckcphquawobehtk.supabase.co','sb_publishable_tY1y97VnFfhXyKJ_9XCNGw_-rEq2pLx');let user=null,ws=null,cs=[],ns=[],sel=null,view='today';const $=id=>document.getElementById(id);const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const today=()=>new Date().toISOString().slice(0,10);const fi=s=>s?new Date(s+'T00:00:00').toLocaleDateString('fi-FI'):'–';const ago=s=>s?Math.floor((Date.now()-new Date(s+'T00:00:00'))/86400000):null;function col(s){let d=ago(s);return d==null?'gray':d<=30?'green':d<=60?'yellow':d<=90?'orange':'red'}function setStatus(t,c='hint'){$('status').className=c;$('status').textContent=t}async function auth(){let r=await sb.auth.getUser();user=r.data?.user||null;$('auth').textContent=user?'Kirjautunut: '+user.email:'Kirjaudu ensin varaversiossa';return user}async function workspace(){if(ws)return ws;if(!await auth())throw Error('Kirjautuminen puuttuu');let r=await sb.from('kontakti_workspaces').select('*').limit(1);if(r.error)throw r.error;ws=r.data[0];return ws}async function load(){try{setStatus('Haetaan...');let w=await workspace();let a=await sb.from('kontakti_customers').select('*').eq('workspace_id',w.id).is('deleted_at',null).order('priority',{ascending:false}).order('next_date',{ascending:true,nullsFirst:false});if(a.error)throw a.error;cs=a.data||[];let b=await sb.from('kontakti_notes').select('*').eq('workspace_id',w.id).is('deleted_at',null).order('note_date',{ascending:false}).order('created_at',{ascending:false}).limit(2000);if(b.error)throw b.error;ns=b.data||[];if(!sel&&cs[0])sel=cs[0].id;render();setStatus('Haettu '+cs.length+' asiakasta','ok')}catch(e){setStatus('Virhe: '+e.message,'err')}}function due(c){return !c.next_date?'Ei päivää':c.next_date<today()?'Erääntynyt':c.next_date===today()?'Tänään':'Tulossa'}function visible(){let a=[...cs];if(view==='today')a=a.filter(c=>c.next_date&&c.next_date<=today());if(view==='customers'){let q=$('q').value.toLowerCase();a=a.filter(c=>[c.name,c.city,c.region,c.phone,c.email,c.address,c.business_id].join(' ').toLowerCase().includes(q))}return a.sort((x,y)=>(y.priority-x.priority)||(x.next_date||'').localeCompare(y.next_date||'')||(x.name||'').localeCompare(y.name||''))}function render(){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));$('page').textContent=view==='today'?'Soita tänään':view==='customers'?'Asiakkaat':view==='weekly'?'Viikkoraportti':'Asetukset';$('searchBox').style.display=view==='customers'?'flex':'none';$('pCust').textContent=cs.length;$('pToday').textContent=cs.filter(c=>c.next_date&&c.next_date<=today()).length;let total=cs.reduce((s,c)=>s+Number(c.sales_ytd||0),0);$('sales').textContent='€'+total.toLocaleString('fi-FI');$('salesSub').textContent=cs.filter(c=>Number(c.sales_ytd||0)>0).length+' ostanutta';if(view==='weekly')return weekly();if(view==='settings')return settings();let arr=visible();$('listSub').textContent=view==='today'?'Erääntyneet + tänään':'Kaikki asiakkaat';$('list').innerHTML=arr.map(c=>'<div class="row '+(sel===c.id?'active':'')+'" data-id="'+c.id+'"><div class="row-top"><div class="row-left"><span class="dot '+col(c.last_contact)+'"></span><div><div class="row-name">'+esc(c.name)+'</div><div class="row-meta">'+esc(c.city||c.region||'–')+(c.phone?'<br>Puhelin: '+esc(c.phone):'')+'</div></div></div>'+(c.priority?'<span class="tag prio">🟣 Priority</span>':'')+'</div><div class="tags"><span class="tag">Seuraava: '+fi(c.next_date)+' ('+due(c)+')</span><span class="tag">Viime: '+fi(c.last_contact)+' '+(ago(c.last_contact)!=null?'('+ago(c.last_contact)+' pv)':'')+'</span><span class="tag">'+esc(c.next_action||'Soitto')+'</span></div></div>').join('')||'<div class="empty">Ei asiakkaita.</div>';document.querySelectorAll('.row').forEach(r=>r.onclick=()=>{sel=r.dataset.id;show();render()});show()}function show(){let c=cs.find(x=>x.id===sel);if(!c){$('dName').textContent='Valitse asiakas';$('dSub').textContent='Klikkaa listasta asiakasta.';$('detail').innerHTML='<div class="box hint">Valitse asiakas vasemmalta.</div>';return}$('dName').textContent=c.name;$('dSub').innerHTML='<span>Viime kontakti: <b>'+fi(c.last_contact)+'</b></span><span>Seuraava: <b>'+fi(c.next_date)+'</b></span>'+(c.priority?'<span class="pill">🟣 Priority</span>':'');let hist=ns.filter(n=>n.customer_id===c.id);$('detail').innerHTML='<div class="box"><div class="box-title"><b>Nykytila</b><span class="muted">nyt</span></div><div class="kv"><b>Seuraava</b><span>'+fi(c.next_date)+'</span></div><div class="kv"><b>Toimenpide</b><span>'+esc(c.next_action||'Soitto')+'</span></div><div class="kv"><b>Myynti YTD</b><span>€'+Number(c.sales_ytd||0).toLocaleString('fi-FI')+'</span></div></div><div class="box"><div class="box-title"><b>Muistiinpano</b><span class="muted">'+fi(today())+'</span></div><select id="nt"><option>Soitto</option><option>Tapaaminen</option><option>Sähköposti</option><option>Seuranta</option><option>Muistiinpano</option></select><textarea id="txt" placeholder="Kirjaa muistiinpano..."></textarea><div class="grid"><input id="nd" type="date" value="'+esc(c.next_date||'')+'"><select id="na"><option>Soitto</option><option>Tapaaminen</option><option>Sähköposti</option><option>Seuranta</option></select></div><div class="quick"><button class="btn primary" id="save">Tallenna merkintä</button><button class="btn prio" id="prio">'+(c.priority?'🟣 Priority päällä':'🟣 Priority pois')+'</button></div></div><div class="box"><div class="box-title"><b>Perustiedot</b><span class="muted">read-only</span></div><div class="kv"><b>Y-tunnus</b><span>'+esc(c.business_id||'–')+'</span></div><div class="kv"><b>Puhelin</b><span>'+esc(c.phone||'–')+'</span></div><div class="kv"><b>Email</b><span>'+esc(c.email||'–')+'</span></div><div class="kv"><b>Osoite</b><span>'+esc(c.address||'–')+'</span></div></div><div class="box"><div class="box-title"><b>Historia</b><span class="muted">'+hist.length+' merkintää</span></div>'+hist.slice(0,15).map(n=>'<div class="kv"><b>'+fi(n.note_date)+'</b><span>'+esc((n.note_type||'Merkintä')+': '+(n.note_text||''))+'</span></div>').join('')+'</div>';$('na').value=c.next_action||'Soitto';$('save').onclick=()=>save(c);$('prio').onclick=()=>toggle(c)}async function save(c){try{let text=$('txt').value.trim();if(!text)throw Error('Kirjaa muistiinpano ensin');let w=await workspace();let nd=$('nd').value||null,na=$('na').value||'Soitto';let r=await sb.from('kontakti_notes').insert({workspace_id:w.id,customer_id:c.id,note_date:today(),note_type:$('nt').value,note_text:text,next_date:nd,created_source:'cloud-ui-v2'});if(r.error)throw r.error;let u=await sb.from('kontakti_customers').update({last_contact:today(),next_date:nd,next_action:na}).eq('id',c.id);if(u.error)throw u.error;await load();setStatus('Merkintä tallennettu','ok')}catch(e){setStatus('Virhe: '+e.message,'err')}}async function toggle(c){try{let u=await sb.from('kontakti_customers').update({priority:!c.priority}).eq('id',c.id);if(u.error)throw u.error;await load()}catch(e){setStatus('Virhe: '+e.message,'err')}}function weekly(){let m=today().slice(0,8)+'01';let rows=ns.filter(n=>n.note_date>=m);let names=Object.fromEntries(cs.map(c=>[c.id,c.name]));$('listSub').textContent='Kuukauden merkinnät';$('list').innerHTML='<div class="empty">Merkintöjä: '+rows.length+'</div>';$('dName').textContent='Viikkoraportti';$('dSub').textContent='Kopioitava raportti';$('detail').innerHTML='<div class="box"><textarea id="rep" style="min-height:360px">RAPORTTI\n\nMerkintöjä: '+rows.length+'\n\n'+rows.map(n=>'- '+fi(n.note_date)+' | '+(names[n.customer_id]||'Asiakas')+' | '+(n.note_type||'Merkintä')+'\n  '+(n.note_text||'')).join('\n\n')+'</textarea><button class="btn primary" id="copy">Kopioi</button></div>';$('copy').onclick=async()=>{await navigator.clipboard.writeText($('rep').value);setStatus('Raportti kopioitu','ok')}}function settings(){$('listSub').textContent='Työkalut';$('list').innerHTML='<a class="btn" href="import.html?v=1">📥 Import</a><a class="btn" href="report.html?v=1">📊 Raportti</a><a class="btn" href="supabase.html?v=5">🛟 Varaversio</a>';$('dName').textContent='Asetukset';$('dSub').textContent='Pilvisynkka';$('detail').innerHTML='<div class="box hint">Tämä on UI-kierros 2: alkuperäisen Kontaktin tyyliä lähestyvä pilviversio.</div>'}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{view=b.dataset.view;render()});$('q').oninput=render;$('refresh').onclick=load;await auth();await load();</script></body></html>
