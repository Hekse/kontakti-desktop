<!doctype html><html lang="fi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kontakti raportti</title><style>body{margin:0;background:#07111f;color:#eef4ff;font:15px system-ui;padding:18px}main{max-width:980px;margin:auto}.card{border:1px solid rgba(160,190,230,.18);background:#0f2137;border-radius:22px;padding:16px;margin:10px 0}.btn,input{font:inherit}.btn{border:1px solid rgba(78,158,255,.35);background:rgba(78,158,255,.16);color:#eef4ff;border-radius:14px;padding:10px 12px;font-weight:850;cursor:pointer;text-decoration:none;display:inline-block}input{border:1px solid rgba(190,215,255,.24);background:#071426;color:#fff;border-radius:14px;padding:10px;margin:6px 0 10px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.muted{color:#9fb1cb}.ok{color:#b9f6d4}.err{color:#ffc0c0}pre{white-space:pre-wrap;background:#071426;border:1px solid rgba(160,190,230,.18);border-radius:18px;padding:14px;min-height:260px}@media(max-width:700px){.grid{grid-template-columns:1fr}body{padding:12px}}</style></head><body><main><div class="card"><h1>Kontakti viikkoraportti</h1><p class="muted">Hae pilvestä merkinnät ja kopioi raportti Wordiin.</p></div><div class="card"><b>Kirjautuminen</b><div class="grid"><input id="email" placeholder="sähköposti"><input id="password" type="password" placeholder="salasana"></div><button class="btn" id="signin">Kirjaudu</button> <button class="btn" id="signout">Ulos</button> <a class="btn" href="supabase.html?v=5">Takaisin desktopiin</a><p id="auth" class="muted">Tarkistetaan...</p></div><div class="card"><b>Raportin päivät</b><div class="grid"><input id="start" type="date"><input id="end" type="date"></div><button class="btn" id="load">Luo raportti</button> <button class="btn" id="copy">Kopioi raportti</button><p id="status" class="muted">Valmis.</p></div><div class="card"><pre id="report">Raportti tulee tähän.</pre></div></main><script type="module">import{createClient}from'https://esm.sh/@supabase/supabase-js@2';const sb=createClient('https://miahuckcphquawobehtk.supabase.co','sb_publishable_tY1y97VnFfhXyKJ_9XCNGw_-rEq2pLx');let user=null,workspace=null;const $=id=>document.getElementById(id);function msg(id,t,c='muted'){$(id).className=c;$(id).textContent=t}function d(s){return new Date(s).toLocaleDateString('fi-FI')}function iso(x){return x.toISOString().slice(0,10)}function week(){let now=new Date();let day=(now.getDay()+6)%7;let mon=new Date(now);mon.setDate(now.getDate()-day);let sun=new Date(mon);sun.setDate(mon.getDate()+6);$('start').value=iso(mon);$('end').value=iso(sun)}async function auth(){const{data}=await sb.auth.getUser();user=data?.user||null;msg('auth',user?'Kirjautunut: '+user.email:'Ei kirjautunut',user?'ok':'muted');return user}async function ws(){if(workspace)return workspace;if(!await auth())throw Error('Kirjaudu ensin');let r=await sb.from('kontakti_workspaces').select('*').limit(1);if(r.error)throw r.error;if(!r.data?.length)throw Error('Työtilaa ei löytynyt');workspace=r.data[0];return workspace}async function make(){try{msg('status','Haetaan merkintöjä...');let w=await ws();let a=$('start').value,b=$('end').value;if(!a||!b)throw Error('Valitse päivät');let n=await sb.from('kontakti_notes').select('note_date,note_type,note_text,next_date,customer_id').eq('workspace_id',w.id).is('deleted_at',null).gte('note_date',a).lte('note_date',b).order('note_date',{ascending:true});if(n.error)throw n.error;let ids=[...new Set((n.data||[]).map(x=>x.customer_id).filter(Boolean))];let names={};if(ids.length){let c=await sb.from('kontakti_customers').select('id,name').in('id',ids);if(c.error)throw c.error;(c.data||[]).forEach(x=>names[x.id]=x.name)}let rows=n.data||[];let out='VIIKKORAPORTTI '+d(a)+' - '+d(b)+'\n\n';out+='Merkintöjä yhteensä: '+rows.length+'\n\n';if(!rows.length)out+='Ei merkintöjä valitulla ajalla.\n';for(const r of rows){out+='- '+d(r.note_date)+' | '+(names[r.customer_id]||'Asiakas')+' | '+(r.note_type||'Merkintä')+'\n';if(r.note_text)out+='  '+r.note_text+'\n';if(r.next_date)out+='  Seuraava: '+d(r.next_date)+'\n';out+='\n'}$('report').textContent=out;msg('status','Raportti valmis','ok')}catch(x){msg('status','Virhe: '+x.message,'err')}}$('signin').onclick=async()=>{let r=await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});if(r.error)return msg('auth','Virhe: '+r.error.message,'err');workspace=null;await auth()};$('signout').onclick=async()=>{await sb.auth.signOut();workspace=null;await auth()};$('load').onclick=make;$('copy').onclick=async()=>{await navigator.clipboard.writeText($('report').textContent);msg('status','Kopioitu leikepöydälle','ok')};week();await auth();</script></body></html>
